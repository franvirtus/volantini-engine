output_name: virtus_difesa_personale_layout

canvas:
  width: 1080
  height: 1530
  background: "#F7F4F0"

assets_base: "assets/images"

layers:
  - id: top_bar
    type: rect
    x: 0
    y: 0
    w: 1080
    h: 44
    fill: "#8B1A2B"

  - id: hero
    type: image
    src: "hero.jpg"
    x: 80
    y: 120
    w: 920
    h: 520
    fit: cover

  - id: logo
    type: image
    src: "logo.png"
    x: 80
    y: 690
    w: 130
    h: 130
    fit: contain

  - id: title
    type: text
    text: "DIFESA PERSONALE"
    x: 235
    y: 690
    w: 765
    h: 100
    font: "Montserrat"
    bold: true
    size: 68
    color: "#2C2C2C"
    align: left

