    size: 21
    color: "{{theme.text}}"
    align: center
    line_height: 1.22

  - id: c3_text
    type: text
    text: "{{card3}}"
    x: 539
    y: 1295
    w: 236
    h: 74
    font: "{{theme.font}}"
    size: 21
    color: "{{theme.text}}"
    align: center
    line_height: 1.22

  - id: c4_text
    type: text
    text: "{{card4}}"
    x: 791
    y: 1295
    w: 254
    h: 74
    font: "{{theme.font}}"
    size: 21
    color: "{{theme.text}}"
    align: center
    line_height: 1.22

  # ── CTA bar text (y=1417..1526) ───────────────────────────────────────────
  - id: cta_main
    type: text
    text: "{{cta_main}}"
    x: 175
    y: 1436
    w: 730
    h: 54
    font: "{{theme.font}}"
    bold: true
    size: 44
    color: "{{theme.white}}"
    align: center

  - id: cta_sub
