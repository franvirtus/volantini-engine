    size: 27
    color: "{{theme.white}}"
    align: left
    line_height: 1.32

  # ── Badge POSTI LIMITATI (cerchio oro a destra, y≈888..1070) ─────────────
  - id: badge_t1
    type: text
    text: "POSTI"
    x: 788
    y: 926
    w: 175
    h: 46
    font: "{{theme.font}}"
    bold: true
    size: 29
    color: "{{theme.green}}"
    align: center

  - id: badge_t2
    type: text
    text: "LIMITATI"
    x: 788
    y: 1014
    w: 175
    h: 46
    font: "{{theme.font}}"
    bold: true
    size: 29
    color: "{{theme.green}}"
    align: center

  # ── COSA IMPARERAI header (y≈1090) ────────────────────────────────────────
  - id: cosa_title
    type: text
    text: "COSA IMPARERAI"
    x: 280
    y: 1093
    w: 520
    h: 40
    font: "{{theme.font}}"
    bold: true
    size: 26
    color: "{{theme.text}}"
    align: center
    letter_spacing: 4

  # ── Card labels (4 carte, icone già nel template) ─────────────────────────
  - id: c1_text
    type: text
    text: "{{card1}}"
    x: 35
    y: 1295
    w: 236
    h: 74
    font: "{{theme.font}}"
    size: 21
    color: "{{theme.text}}"
